name: "Deploy hosted MCP server"

# Manual-dispatch deploy of the hosted remote MCP server (Phase 1, #33 / epic #31).
# Container-image SAM stack: builds the esbuild bundle, docker-builds the image via
# `sam build`, and deploys with secrets from the GitHub environment.
#
# AWS auth mirrors the org's SAM pipeline pattern:
# OIDC -> Hub IaCProvisioningRole -> role-chain into the target account's IaCProvisioningRole.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        required: true
        options:
          - dev
          - production

# SECURITY (public repo): this workflow assumes the AWS IaCProvisioningRole via OIDC.
# It is `workflow_dispatch` only (write-access gated) and runs under a protected GitHub
# Environment, so its OIDC subject is `repo:ApparelHub-AI/apparelhub-mcp:environment:<env>`
# and the AWS OIDC trust is scoped to exactly that. NEVER add a `pull_request` /
# `pull_request_target` trigger here, and never grant `id-token: write` to any
# PR-triggered workflow in this repo — a fork PR could otherwise assume this deploy role.
# AWS account ids + the Hub role ARN live in secrets, not in this public file.
permissions:
  id-token: write # OIDC
  contents: read

jobs:
  deploy:
    name: "Deploy to ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Build handler bundle
        run: |
          npm ci
          deploy/hosted/build.sh

      - name: Configure AWS credentials (OIDC -> Hub IaCProvisioningRole)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.HUB_ROLE_ARN }}
          role-duration-seconds: 3600
          role-skip-session-tagging: true
          unset-current-credentials: true

      - name: Assume target-account IaCProvisioningRole (role chaining)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-1
          role-to-assume: "arn:aws:iam::${{ secrets.TARGET_ACCOUNT_ID }}:role/IaCProvisioningRole"
          role-chaining: true
          role-skip-session-tagging: true
          role-duration-seconds: 3600

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build (docker image)
        working-directory: deploy/hosted
        run: sam build

      - name: SAM deploy
        working-directory: deploy/hosted
        run: |
          sam deploy \
            --config-env "${{ inputs.environment }}" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "ApparelhubApiKey=${{ secrets.APPARELHUB_AGENT_API_KEY }}" \
              "McpBearer=${{ secrets.MCP_BEARER }}" \
              "McpStaticBearerEnabled=true" \
              "McpOauthIssuer=${{ secrets.MCP_OAUTH_ISSUER }}" \
              "McpServiceKey=${{ secrets.MCP_SERVICE_KEY }}" \
              "ApparelhubApiBaseUrl=${{ vars.MCP_API_BASE_URL || 'https://api.apparelhub.ai/agents/v1' }}"

      - name: Smoke the deployed endpoint
        run: |
          URL=$(aws cloudformation describe-stacks --stack-name apparelhub-mcp-hosted --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='FunctionUrl'].OutputValue" --output text)
          echo "Function URL: $URL"
          for i in 1 2 3; do
            BODY=$(curl -s --max-time 30 "${URL}healthz" || true)
            if [ "$BODY" = '{"ok":true}' ]; then echo "healthz ok"; exit 0; fi
            sleep 5
          done
          echo "healthz smoke FAILED: $BODY"
          exit 1
