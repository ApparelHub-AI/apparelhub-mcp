name: Forbidden patterns (public-repo hygiene)

# This is a PUBLIC repo. Guard against committing account-specific / sensitive
# data (ApparelHub Rule 13): real names / account references, real store
# hostnames, or full account UUIDs. Use generic placeholders instead
# (e.g. "Acme Co", "your-store.myshopify.com", short ids like w1/s1/p1).
#
# The list of real names/account terms is NOT in this (public) file — it lives
# in the FORBIDDEN_TERMS repo secret, so the terms themselves are never exposed
# here. Every check runs with `grep -q` (no output) so a matched value can never
# be echoed into the public build logs; the error just names the category and
# tells you to grep locally.
#
# SECURITY: keep this on `pull_request` (never `pull_request_target`) and never add
# `id-token: write` or cloud credentials — fork PRs execute untrusted code here.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan:
    name: No sensitive / account data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Scan tracked source + docs
        env:
          FORBIDDEN_TERMS: ${{ secrets.FORBIDDEN_TERMS }}
        run: |
          set -uo pipefail
          mapfile -t FILES < <(git ls-files '*.ts' '*.js' '*.mjs' '*.cjs' '*.md' '*.json' '*.yml' '*.yaml' \
            | grep -vE '(^|/)(package-lock\.json|pnpm-lock\.yaml|yarn\.lock)$' || true)
          if [ "${#FILES[@]}" -eq 0 ]; then echo "no files to scan"; exit 0; fi
          fail=0

          # 1) Real names / account references. Pattern is the FORBIDDEN_TERMS
          #    repo secret (never in this public file); -q so a matched term is
          #    never printed to the (public) logs.
          if [ -n "${FORBIDDEN_TERMS:-}" ]; then
            if grep -IlqE "$FORBIDDEN_TERMS" "${FILES[@]}" >/dev/null 2>&1; then
              echo "::error::A forbidden term (real name / account reference, Rule 13) is present in a tracked file. Replace it with a generic placeholder (e.g. 'Acme Co'). The term list is the FORBIDDEN_TERMS repo secret — grep your working tree against your own copy of it to find the offender."
              fail=1
            fi
          else
            echo "::warning::FORBIDDEN_TERMS secret unavailable in this context (e.g. a fork PR); skipping the name check. UUID + host checks still run."
          fi

          # 2) Real *.myshopify.com hosts (allow only the generic example). Quiet:
          #    extract hosts, drop the allowed one; a match means a real host.
          if grep -IhoE '[a-z0-9-]+\.myshopify\.com' "${FILES[@]}" | grep -qvxE 'your-store\.myshopify\.com'; then
            echo "::error::A real *.myshopify.com host is present (Rule 13). Use your-store.myshopify.com."
            fail=1
          fi

          # 3) Full UUIDs — a real one is almost certainly an account/store/workspace id.
          if grep -IlqE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' "${FILES[@]}" >/dev/null 2>&1; then
            echo "::error::A full UUID is present in tracked source/docs (Rule 13). Use a short placeholder like w1/s1/p1."
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "Rule 13 hygiene: clean."
