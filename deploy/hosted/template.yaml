AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  ApparelHub hosted remote MCP server (Phase 1 of epic #31, ticket #33).
  Container-image Lambda behind a Function URL serving the tool surface over
  MCP streamable HTTP (stateless, JSON responses). Static-bearer auth until
  the Phase 2 OAuth authorization server replaces it.

Parameters:
  ApparelhubApiKey:
    Type: String
    NoEcho: true
    Description: Platform Agent API key the hosted tools call the platform API with.
  McpBearer:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: >-
      Static bearer secret (smoke-test path). Only honored when
      McpStaticBearerEnabled is 'true'.
  McpStaticBearerEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Keep the Phase 0.5 static bearer alive alongside OAuth (dies in Phase 3).
  McpOauthIssuer:
    Type: String
    Default: ''
    Description: >-
      OAuth authorization-server issuer (e.g. the platform API origin). Empty
      disables OAuth mode and the protected-resource metadata.
  McpServiceKey:
    Type: String
    NoEcho: true
    Default: ''
    Description: SERVICE credential for the platform token-resolve endpoint.
  ApparelhubApiBaseUrl:
    Type: String
    Default: 'https://api.apparelhub.ai/agents/v1'
    Description: >-
      Platform agents API base URL this deploy integrates with (tool calls +
      token resolve). Prod default; the dev-account deploy sets the dev origin
      so the dev domain is a true dev environment, not a second door to prod.

Resources:
  HostedFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: apparelhub-mcp-hosted
      Description: Hosted remote MCP server (streamable HTTP, container image with imaging toolchain)
      PackageType: Image
      MemorySize: 2048
      Timeout: 300
      Environment:
        Variables:
          APPARELHUB_API_KEY: !Ref ApparelhubApiKey
          MCP_BEARER: !Ref McpBearer
          MCP_STATIC_BEARER_ENABLED: !Ref McpStaticBearerEnabled
          MCP_OAUTH_ISSUER: !Ref McpOauthIssuer
          MCP_SERVICE_KEY: !Ref McpServiceKey
          APPARELHUB_API_BASE_URL: !Ref ApparelhubApiBaseUrl
          APPARELHUB_MCP_TELEMETRY: 'off'
      FunctionUrlConfig:
        AuthType: NONE
      Tags:
        Managed-by: SAM
        Project: apparelhub-mcp
        Lifecycle: hosted
    Metadata:
      Dockerfile: deploy/hosted/Dockerfile
      DockerContext: ../..
      DockerTag: hosted

  # Connector-traffic observability (epic #36). Reads the EMF metrics the hosted
  # Lambda emits per request (namespace ApparelHub/MCP, dims Outcome + ToolName).
  # One dashboard per account (dev stack -> dev account, prod stack -> prod account).
  ConnectorDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub '${AWS::StackName}-connector'
      DashboardBody: !Sub |
        {"widgets":[{"type":"text","x":0,"y":0,"width":24,"height":1,"properties":{"markdown":"# Remote MCP Connector (${AWS::StackName}) - traffic + health. Provisioned by SAM (epic #31 / #36)."}},{"type":"metric","x":0,"y":1,"width":12,"height":6,"properties":{"title":"Requests by outcome","region":"${AWS::Region}","view":"timeSeries","stacked":false,"period":300,"metrics":[[{"expression":"SEARCH('{ApparelHub/MCP,Outcome} MetricName=\"Requests\"', 'Sum', 300)","label":"","id":"reqOut"}]]}},{"type":"metric","x":12,"y":1,"width":12,"height":6,"properties":{"title":"Tool calls by tool","region":"${AWS::Region}","view":"timeSeries","stacked":true,"period":300,"metrics":[[{"expression":"SEARCH('{ApparelHub/MCP,ToolName} MetricName=\"Requests\"', 'Sum', 300)","label":"","id":"reqTool"}]]}},{"type":"metric","x":0,"y":7,"width":12,"height":6,"properties":{"title":"Latency by outcome (ms)","region":"${AWS::Region}","view":"timeSeries","period":300,"metrics":[[{"expression":"SEARCH('{ApparelHub/MCP,Outcome} MetricName=\"LatencyMs\"', 'p99', 300)","label":"p99","id":"lat99"}],[{"expression":"SEARCH('{ApparelHub/MCP,Outcome} MetricName=\"LatencyMs\"', 'p50', 300)","label":"p50","id":"lat50"}]]}},{"type":"metric","x":12,"y":7,"width":12,"height":6,"properties":{"title":"Hosted Lambda health","region":"${AWS::Region}","view":"timeSeries","period":300,"stat":"Sum","metrics":[["AWS/Lambda","Invocations","FunctionName","apparelhub-mcp-hosted"],[".","Errors",".","."],[".","Throttles",".","."],[".","Duration",".",".",{"stat":"p99","label":"Duration p99 (ms)"}]]}}]}

Outputs:
  FunctionUrl:
    Description: Base URL (append /<secret>/mcp for the connector endpoint).
    Value: !GetAtt HostedFunctionUrl.FunctionUrl
  FunctionName:
    Value: !Ref HostedFunction
